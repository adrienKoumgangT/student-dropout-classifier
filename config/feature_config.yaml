# ============================================================
# Student Dropout Prediction - Feature Configuration
# ============================================================
# This file defines all feature categories, mappings,
# and preprocessing parameters for the ML pipeline.
# ============================================================


# ============================================================
# 1. TARGET VARIABLE
# ============================================================
target:
  name: "Target"
  encoded_name: "Target_encoded"
  description: "Student final status (Dropout or Graduate)"
  mapping:
    Dropout: 1
    Graduate: 0
  positive_class: "Dropout"
  positive_class_label: 1

# ============================================================
# 2. BINARY FEATURES (0/1 - No transformation needed)
# ============================================================
binary_features:
  - name: "Gender"
    original_column: "Gender"
    mapping:
      0: "Female"
      1: "Male"
    description: "Student's gender"

  - name: "Scholarship holder"
    original_column: "Scholarship holder"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether the student holds a scholarship"

  - name: "Debtor"
    original_column: "Debtor"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether the student has outstanding tuition fees"

  - name: "Tuition fees up to date"
    original_column: "Tuition fees up to date"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether tuition fees are current"

  - name: "Displaced"
    original_column: "Displaced"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether the student is displaced from their home region"

  - name: "Educational special needs"
    original_column: "Educational special needs"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether the student has special educational needs"

  - name: "International"
    original_column: "International"
    mapping:
      0: "No"
      1: "Yes"
    description: "Whether the student is an international student"

  - name: "Daytime/evening attendance"
    original_column: "Daytime/evening attendance"
    mapping:
      0: "Evening"
      1: "Daytime"
    description: "Class attendance period"

