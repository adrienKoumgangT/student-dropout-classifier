# ============================================================
# 5. CONTINUOUS NUMERICAL FEATURES
# ============================================================
continuous_features:
  demographic:
    - name: "Age at enrollment"
      original_column: "Age at enrollment"
      description: "Student's age when enrolling"
      range: [17, 70]
      unit: "years"

  academic_history:
    - name: "Previous qualification (grade)"
      original_column: "Previous qualification (grade)"
      description: "Final grade from previous education"
      range: [0, 200]
      note: "Portuguese grading scale (0-200)"

    - name: "Admission grade"
      original_column: "Admission grade"
      description: "Combined admission score"
      range: [0, 200]
      note: "Portuguese grading scale (0-200)"

  first_semester:
    - name: "Curricular units 1st sem (credited)"
      original_column: "Curricular units 1st sem (credited)"
      description: "Courses with credit/enrollment equivalence"
      range: [0, 20]

    - name: "Curricular units 1st sem (enrolled)"
      original_column: "Curricular units 1st sem (enrolled)"
      description: "Total courses enrolled in"
      range: [0, 20]

    - name: "Curricular units 1st sem (evaluations)"
      original_column: "Curricular units 1st sem (evaluations)"
      description: "Total assessments taken"
      range: [0, 45]

    - name: "Curricular units 1st sem (approved)"
      original_column: "Curricular units 1st sem (approved)"
      description: "Courses passed"
      range: [0, 20]

    - name: "Curricular units 1st sem (grade)"
      original_column: "Curricular units 1st sem (grade)"
      description: "Average grade for the semester"
      range: [0, 20]
      note: "Portuguese grading scale (0-20)"

    - name: "Curricular units 1st sem (without evaluations)"
      original_column: "Curricular units 1st sem (without evaluations)"
      description: "Courses enrolled but not evaluated"
      range: [0, 20]

  second_semester:
    - name: "Curricular units 2nd sem (credited)"
      original_column: "Curricular units 2nd sem (credited)"
      description: "Courses with credit/enrollment equivalence"
      range: [0, 20]

    - name: "Curricular units 2nd sem (enrolled)"
      original_column: "Curricular units 2nd sem (enrolled)"
      description: "Total courses enrolled in"
      range: [0, 20]

    - name: "Curricular units 2nd sem (evaluations)"
      original_column: "Curricular units 2nd sem (evaluations)"
      description: "Total assessments taken"
      range: [0, 45]

    - name: "Curricular units 2nd sem (approved)"
      original_column: "Curricular units 2nd sem (approved)"
      description: "Courses passed"
      range: [0, 20]

    - name: "Curricular units 2nd sem (grade)"
      original_column: "Curricular units 2nd sem (grade)"
      description: "Average grade for the semester"
      range: [0, 20]
      note: "Portuguese grading scale (0-20)"

    - name: "Curricular units 2nd sem (without evaluations)"
      original_column: "Curricular units 2nd sem (without evaluations)"
      description: "Courses enrolled but not evaluated"
      range: [0, 20]

  economic_indicators:
    - name: "Unemployment rate"
      original_column: "Unemployment rate"
      description: "National unemployment rate at enrollment"
      unit: "percentage"

    - name: "Inflation rate"
      original_column: "Inflation rate"
      description: "National inflation rate at enrollment"
      unit: "percentage"

    - name: "GDP"
      original_column: "GDP"
      description: "GDP growth rate at enrollment"
      unit: "percentage"

# ============================================================
# 6. ENGINEERED FEATURES (Created during preprocessing)
# ============================================================
engineered_features:
  academic_performance:
    - name: "approval_rate_sem1"
      formula: "(Curricular units 1st sem (approved) / Curricular units 1st sem (enrolled)) * 100"
      description: "Percentage of enrolled courses passed in 1st semester"
      type: "percentage"
      range: [0, 100]

    - name: "approval_rate_sem2"
      formula: "(Curricular units 2nd sem (approved) / Curricular units 2nd sem (enrolled)) * 100"
      description: "Percentage of enrolled courses passed in 2nd semester"
      type: "percentage"
      range: [0, 100]

    - name: "grade_momentum"
      formula: "Curricular units 1st sem (grade) - Admission grade"
      description: "Change in performance from admission to 1st semester"
      type: "continuous"
      range: [-200, 20]

    - name: "grade_decline"
      formula: "Curricular units 1st sem (grade) - Curricular units 2nd sem (grade)"
      description: "Grade change from 1st to 2nd semester (positive = declining)"
      type: "continuous"

    - name: "evaluation_intensity_sem1"
      formula: "Curricular units 1st sem (evaluations) / Curricular units 1st sem (enrolled)"
      description: "Average evaluations per enrolled course in 1st semester"
      type: "ratio"

    - name: "credit_utilization_sem1"
      formula: "Curricular units 1st sem (credited) / Curricular units 1st sem (enrolled)"
      description: "Ratio of credited to enrolled courses (prior credits usage)"
      type: "ratio"

  socioeconomic:
    - name: "financial_stress"
      formula: "Debtor + (1 - Tuition fees up to date) + (1 - Scholarship holder)"
      description: "Combined financial stress indicator (0-3 scale, higher = more stress)"
      type: "score"
      range: [0, 3]

    - name: "parent_education"
      formula: "(Mother's qualification + Father's qualification) / 2"
      description: "Average parental education level"
      type: "continuous"

# ============================================================
# 7. FEATURE GROUPS FOR EXPERIMENTS
# ============================================================
experiment_feature_groups:
  # Early prediction model (before 2nd semester results)
  early_intervention:
    description: "Features available after 1st semester for early dropout intervention"
    include_categories:
      - "binary_features"
      - "ordinal_features"
      - "nominal_features"
      - "academic_history"
      - "first_semester"
      - "economic_indicators"
      - "demographic"
    exclude_patterns:
      - "2nd sem"
      - "sem2"
    engineered_features:
      - "approval_rate_sem1"
      - "grade_momentum"
      - "evaluation_intensity_sem1"
      - "financial_stress"
      - "parent_education"

  # Full model (after 2nd semester)
  complete_model:
    description: "All available features for maximum predictive power"
    include_categories:
      - "binary_features"
      - "ordinal_features"
      - "nominal_features"
      - "academic_history"
      - "first_semester"
      - "second_semester"
      - "economic_indicators"
      - "demographic"
    engineered_features:
      - "approval_rate_sem1"
      - "approval_rate_sem2"
      - "grade_momentum"
      - "grade_decline"
      - "evaluation_intensity_sem1"
      - "credit_utilization_sem1"
      - "financial_stress"
      - "parent_education"

  # Minimal interpretable model
  interpretable_model:
    description: "Subset of highly interpretable features for policy decisions"
    features:
      - "Curricular units 1st sem (approved)"
      - "Curricular units 1st sem (grade)"
      - "Admission grade"
      - "Debtor"
      - "Tuition fees up to date"
      - "Scholarship holder"
      - "Age at enrollment"
      - "Gender"
      - "approval_rate_sem1"
      - "financial_stress"

# ============================================================
# 8. PREPROCESSING PARAMETERS
# ============================================================
preprocessing:
  # Missing value strategy
  missing_values:
    numerical_strategy: "median"
    categorical_strategy: "mode"

  # Encoding strategies
  encoding:
    nominal_strategy: "onehot"
    ordinal_strategy: "passthrough"
    binary_strategy: "passthrough"
    onehot_params:
      drop: "first"
      sparse: false
      handle_unknown: "ignore"

  # Scaling
  scaling:
    method: "standard"
    apply_to:
      - "continuous"
      - "binary"
      - "ordinal"
    exclude:
      - "onehot_encoded"

  # Feature selection thresholds
  feature_selection:
    variance_threshold: 0.01
    correlation_threshold: 0.95
    min_importance: 0.001

  # Train-test split
  data_split:
    test_size: 0.2
    validation_size: 0.25  # from training set
    random_state: 42
    stratify: true
    shuffle: true
